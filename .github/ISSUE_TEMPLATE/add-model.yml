name: "Add / fix a model"
description: "Suggest a biological foundation model or report a correction for evidence review."
title: "[model] <name>"
labels: ["add-model"]
body:
  - type: input
    id: name
    attributes:
      label: Model name
    validations:
      required: true
  - type: dropdown
    id: modality
    attributes:
      label: Modality
      options:
        - dna
        - rna
        - protein
        - complex
        - molecule
        - singlecell
        - spatial
        - multimodal
        - platform
        - benchmark
    validations:
      required: true
  - type: input
    id: year
    attributes:
      label: Year
  - type: textarea
    id: description
    attributes:
      label: One-sentence description
    validations:
      required: true
  - type: input
    id: io
    attributes:
      label: Input -> Output
      placeholder: "e.g. protein sequence -> per-residue embeddings"
  - type: input
    id: paper
    attributes:
      label: Paper URL
  - type: input
    id: code
    attributes:
      label: Code / weights URL
  - type: input
    id: access
    attributes:
      label: Access
      placeholder: "Open code + weights | gated | Model hub | Web/API | Paper-only"
  - type: input
    id: use_cases
    attributes:
      label: Main use cases
  - type: markdown
    attributes:
      value: "Submissions are reviewed against current primary sources and the public inclusion policy before any catalog change. Inclusion is not automatic."
